// ─── SHUFFLE ──────────────────────────────────────────────────
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// ─── TIMER SYSTEM ─────────────────────────────────────────────
var TIMER_PREFIX = 'b1_1011x_vs_';
var timerSeconds = [0, 0, 0, 0, 0, 0, 0];
var timerRunning = [false, false, false, false, false, false, false];
var timerStarted = [false, false, false, false, false, false, false];
var timerIntervals = [null, null, null, null, null, null, null];

function timerAutoStart(n) {
  if (timerStarted[n]) return;
  timerStarted[n] = true;
  timerRunning[n] = true;
  timerIntervals[n] = setInterval(function() {
    if (!timerRunning[n]) return;
    timerSeconds[n]++;
    var el = document.getElementById('timer-' + n);
    if (el) el.textContent = Math.floor(timerSeconds[n] / 60) + ':' + ('0' + (timerSeconds[n] % 60)).slice(-2);
  }, 1000);
}

function timerStop(n) {
  if (!timerRunning[n]) return;
  clearInterval(timerIntervals[n]);
  timerRunning[n] = false;
  var key = TIMER_PREFIX + n;
  var prev = parseInt(localStorage.getItem(key) || '0');
  if (!prev || timerSeconds[n] < prev) {
    localStorage.setItem(key, timerSeconds[n]);
    var bestEl = document.getElementById('best-' + n);
    if (bestEl) bestEl.textContent = '🏆 Bestzeit: ' + Math.floor(timerSeconds[n] / 60) + ':' + ('0' + (timerSeconds[n] % 60)).slice(-2);
  }
}

function timerResetOne(n) {
  clearInterval(timerIntervals[n]);
  timerRunning[n] = false;
  timerStarted[n] = false;
  timerSeconds[n] = 0;
  var el = document.getElementById('timer-' + n);
  if (el) el.textContent = '0:00';
}

function loadBestTimes() {
  for (var n = 1; n <= 6; n++) {
    var key = TIMER_PREFIX + n;
    var val = parseInt(localStorage.getItem(key) || '0');
    if (val) {
      var bestEl = document.getElementById('best-' + n);
      if (bestEl) bestEl.textContent = '🏆 Bestzeit: ' + Math.floor(val / 60) + ':' + ('0' + (val % 60)).slice(-2);
    }
  }
}

// ─── ENTDECKUNGS-TAB MC ───────────────────────────────────────
var mcDone = [false, false, false, false];

function mcCheck(step, btn, correct) {
  var btns = btn.parentElement.querySelectorAll('.mc-btn');
  btns.forEach(function(b) { b.disabled = true; b.classList.remove('correct', 'wrong'); });
  var fb = document.getElementById('mcfb' + step);
  if (correct) {
    btn.classList.add('correct');
    fb.textContent = '\u2713 Richtig! Weiter zum nächsten Schritt.';
    fb.className = 'mc-feedback ok';
    mcDone[step] = true;
    document.getElementById('pdot' + step).classList.add('done');
    setTimeout(function() {
      var next = document.getElementById('mc-step' + (step + 1));
      if (next) { next.classList.add('active'); }
      else { document.getElementById('regelkarte').style.display = 'block'; }
    }, 700);
  } else {
    btn.classList.add('wrong');
    fb.textContent = '\u2717 Nicht ganz — schau nochmal genau hin und versuche es erneut.';
    fb.className = 'mc-feedback err';
    setTimeout(function() {
      btns.forEach(function(b) { b.disabled = false; b.classList.remove('wrong', 'correct'); });
      fb.textContent = '';
      fb.className = 'mc-feedback';
    }, 1400);
  }
}

function liveCheck(inp) {
  var val = inp.value.trim().toLowerCase();
  var ans = (inp.dataset.answer || '').toLowerCase();
  inp.classList.remove('correct', 'wrong');
  if (val.length === 0) return;
  if (val === ans) {
    inp.classList.add('correct');
  } else if (ans.indexOf(val) === 0) {
    // valid prefix — neutral
  } else {
    inp.classList.add('wrong');
  }
}

function showHint(inp) {
  var next = inp.nextElementSibling;
  if (next && next.classList.contains('correction-hint')) next.remove();
  inp.value = inp.dataset.answer;
  inp.classList.add('correct');
  inp.classList.remove('wrong');
  var hint = document.createElement('span');
  hint.className = 'correction-hint';
  hint.textContent = inp.dataset.answer;
  inp.insertAdjacentElement('afterend', hint);
}

function lueckeInit() {
  var container = document.getElementById('luecke-container');
  container.innerHTML = '';
  var data = shuffle(LUECKEN_DATA);
  data.forEach(function(item, idx) {
    var div = document.createElement('div');
    div.className = 'luecke-satz';
    item.segs.forEach(function(seg) {
      if (seg.t !== undefined) {
        div.appendChild(document.createTextNode(seg.t));
      } else {
        var inp = document.createElement('input');
        inp.type = 'text';
        inp.className = 'l-inp';
        inp.dataset.answer = seg.b;
        inp.style.width = (sizeMap[seg.s] || 90) + 'px';
        inp.oninput = function() {
          timerAutoStart(1);
          liveCheck(this);
          checkAllLueckeOk();
        };
        div.appendChild(inp);
      }
    });
    container.appendChild(div);
  });
}

var zuoSelected = null;

function colorZuordnungChip(chip) {
  var zone = chip.closest('.drop-zone');
  if (zone) {
    chip.classList.remove('correct', 'wrong');
    chip.classList.add(chip.dataset.cat === zone.dataset.cat ? 'correct' : 'wrong');
  } else {
    chip.classList.remove('correct', 'wrong');
  }
}

function colorAllZuordnungChips() {
  document.querySelectorAll('#zuo-bank .chip, #zone-bew .chip, #zone-job .chip').forEach(function(chip) {
    colorZuordnungChip(chip);
  });
}

function checkZuoAllOk() {
  var all = document.querySelectorAll('#zone-bew .chip, #zone-job .chip');
  var ok = true;
  if (all.length < ZUO_ITEMS.length) return;
  all.forEach(function(ch) { if (!ch.classList.contains('correct')) ok = false; });
  if (ok) timerStop(2);
}

function zuoDrop(event, cat) {
  event.preventDefault();
  var id = event.dataTransfer.getData('text');
  var chip = document.getElementById(id);
  if (!chip) return;
  if (cat) {
    var zone = document.getElementById('zone-' + cat);
    if (zone) { zone.classList.remove('over'); zone.appendChild(chip); }
  } else {
    document.getElementById('zuo-bank').appendChild(chip);
  }
  colorAllZuordnungChips();
  checkZuoAllOk();
}

function zuoInit() {
  var bank = document.getElementById('zuo-bank');
  bank.innerHTML = '';
  document.getElementById('zone-bew').innerHTML = '';
  document.getElementById('zone-job').innerHTML = '';

  var items = shuffle(ZUO_ITEMS);
  items.forEach(function(item, idx) {
    var chip = document.createElement('div');
    chip.className = 'chip';
    chip.id = 'zchip' + idx;
    chip.textContent = item.word;
    chip.dataset.cat = item.cat;
    chip.draggable = true;
    chip.ondragstart = function(e) {
      timerAutoStart(2);
      e.dataTransfer.setData('text', e.target.id);
    };
    chip.ondragend = function() {
      chip.style.opacity = '1';
      colorAllZuordnungChips();
      checkZuoAllOk();
    };
    chip.onclick = function() {
      timerAutoStart(2);
      if (zuoSelected === chip) {
        chip.classList.remove('selected');
        zuoSelected = null;
      } else {
        if (zuoSelected) zuoSelected.classList.remove('selected');
        zuoSelected = chip;
        chip.classList.add('selected');
      }
    };
    bank.appendChild(chip);
  });

  ['zone-bew', 'zone-job'].forEach(function(zoneId) {
    var zone = document.getElementById(zoneId);
    zone.onclick = function() {
      if (zuoSelected) {
        timerAutoStart(2);
        zone.appendChild(zuoSelected);
        zuoSelected.classList.remove('selected');
        zuoSelected = null;
        colorAllZuordnungChips();
        checkZuoAllOk();
      }
    };
  });

  bank.onclick = function() {
    if (zuoSelected && !bank.contains(zuoSelected)) {
      bank.appendChild(zuoSelected);
      zuoSelected.classList.remove('selected');
      zuoSelected = null;
      colorAllZuordnungChips();
      checkZuoAllOk();
    }
  };
}

function zuoShow() {
  timerStop(2);
  // Alle Chips — egal wo sie gerade liegen — anhand ihres data-cat in die richtige Zone verschieben
  document.querySelectorAll('#zuo-bank .chip, #zone-bew .chip, #zone-job .chip').forEach(function(chip) {
    var zone = document.getElementById('zone-' + chip.dataset.cat);
    if (zone) zone.appendChild(chip);
    colorZuordnungChip(chip);
  });
}

function zuoReset() {
  timerResetOne(2);
  zuoSelected = null;
  zuoInit();
}

var sbChips = [];  // [{chipEl, origText}]

function updateCaps(rowEl) {
  var first = rowEl.querySelector('.chip');
  if (first && first.dataset.orig !== ',' && first.dataset.orig !== '?') {
    first.textContent = first.dataset.orig.charAt(0).toUpperCase() + first.dataset.orig.slice(1);
  }
  rowEl.querySelectorAll('.chip').forEach(function(ch) {
    if (ch === first) return;
    ch.textContent = ch.dataset.orig;
  });
}

function checkSbAuto(rowEl, answerArr) {
  var chips = rowEl.querySelectorAll('.chip');
  chips.forEach(function(ch, i) {
    ch.classList.remove('correct', 'wrong');
    if (i < answerArr.length && ch.dataset.orig.toLowerCase() === answerArr[i]) {
      ch.classList.add('correct');
    } else {
      ch.classList.add('wrong');
    }
  });
  if (chips.length === answerArr.length) {
    var allOk = true;
    chips.forEach(function(ch, i) { if (!ch.classList.contains('correct')) allOk = false; });
    return allOk;
  }
  return false;
}

function checkAllSbOk() {
  var items = document.querySelectorAll('#sb-container .sb-item');
  var allOk = true;
  items.forEach(function(item) {
    var row = item.querySelector('.sb-row');
    if (!row) { allOk = false; return; }
    var ansStr = row.dataset.answer || '';
    var ans = ansStr.split('|');
    var chips = row.querySelectorAll('.chip');
    if (chips.length !== ans.length) { allOk = false; return; }
    chips.forEach(function(ch, i) {
      if (ch.dataset.orig.toLowerCase() !== ans[i]) allOk = false;
    });
  });
  if (allOk) timerStop(3);
}

function sbInit() {
  var container = document.getElementById('sb-container');
  container.innerHTML = '';
  sbChips = [];

  var data = shuffle(SB_DATA);
  data.forEach(function(ex, idx) {
    var item = document.createElement('div');
    item.className = 'sb-item';

    var label = document.createElement('div');
    label.className = 'sb-label';
    label.textContent = '\uD83D\uDD04 Satz ' + (idx + 1);
    item.appendChild(label);

    var pool = document.createElement('div');
    pool.className = 'sb-pool';

    var row = document.createElement('div');
    row.className = 'sb-row';
    row.dataset.answer = ex.answer.join('|');

    var parts = shuffle(ex.parts);
    parts.forEach(function(part) {
      var chip = document.createElement('div');
      chip.className = part === ',' || part === '?' ? 'chip comma-chip' : 'chip';
      chip.dataset.orig = part.toLowerCase() === part ? part : part.toLowerCase() === part.toLowerCase() ? part : part;
      // store original for caps logic
      chip.dataset.orig = part;
      chip.textContent = part;
      chip.draggable = true;
      chip.ondragstart = function(e) {
        timerAutoStart(3);
        e.dataTransfer.setData('text', JSON.stringify({ idx: idx, part: part, id: chip._uid }));
        setTimeout(function() { chip.style.opacity = '0.4'; }, 0);
      };
      chip.ondragend = function() { chip.style.opacity = '1'; };
      chip._uid = 'sbchip_' + idx + '_' + Math.random().toString(36).slice(2);
      chip.id = chip._uid;

      chip.onclick = function() {
        timerAutoStart(3);
        var inRow = row.contains(chip);
        if (inRow) {
          pool.appendChild(chip);
          chip.classList.remove('correct', 'wrong');
        } else {
          row.appendChild(chip);
          updateCaps(row);
          checkSbAuto(row, ex.answer);
          checkAllSbOk();
          return;
        }
        updateCaps(row);
        checkSbAuto(row, ex.answer);
        checkAllSbOk();
      };

      pool.appendChild(chip);
    });

    row.ondragover = function(e) { e.preventDefault(); };
    row.ondrop = function(e) {
      e.preventDefault();
      timerAutoStart(3);
      var id = e.dataTransfer.getData('text');
      try { var obj = JSON.parse(id); id = obj.id; } catch(err) {}
      var chip = document.getElementById(id);
      if (chip) {
        row.appendChild(chip);
        chip.style.opacity = '1';
        updateCaps(row);
        checkSbAuto(row, ex.answer);
        checkAllSbOk();
      }
    };

    pool.ondragover = function(e) { e.preventDefault(); };
    pool.ondrop = function(e) {
      e.preventDefault();
      var id = e.dataTransfer.getData('text');
      try { var obj = JSON.parse(id); id = obj.id; } catch(err) {}
      var chip = document.getElementById(id);
      if (chip && row.contains(chip)) {
        pool.appendChild(chip);
        chip.style.opacity = '1';
        chip.classList.remove('correct', 'wrong');
        updateCaps(row);
        checkSbAuto(row, ex.answer);
        checkAllSbOk();
      }
    };

    item.appendChild(pool);
    item.appendChild(row);
    container.appendChild(item);
  });
}

function sbShow() {
  timerStop(3);
  var items = document.querySelectorAll('#sb-container .sb-item');
  items.forEach(function(item) {
    var pool = item.querySelector('.sb-pool');
    var row  = item.querySelector('.sb-row');
    var ansArr = (row.dataset.answer || '').split('|');
    // collect all chips
    var allChips = Array.from(item.querySelectorAll('.chip'));
    // map orig to chip
    var remaining = allChips.slice();
    row.innerHTML = '';
    ansArr.forEach(function(ans) {
      var found = remaining.find(function(ch) { return ch.dataset.orig.toLowerCase() === ans.toLowerCase(); });
      if (found) {
        remaining.splice(remaining.indexOf(found), 1);
        row.appendChild(found);
        found.classList.remove('wrong');
        found.classList.add('correct');
      }
    });
    remaining.forEach(function(ch) { pool.appendChild(ch); });
    updateCaps(row);
  });
}

function sbReset() {
  timerResetOne(3);
  sbInit();
}

function wsLiveCheckEl(inp) {

function konjBuildPanel(idx) {
  var verb = KONJ_VERBS[idx];
  var panel = document.createElement('div');
  panel.className = 'konj-panel' + (idx === 0 ? ' active' : '');
  panel.id = 'konj-panel-' + idx;

  var block = document.createElement('div');
  block.className = 'konj-block';

  var h3 = document.createElement('h3');
  h3.textContent = verb.label;
  block.appendChild(h3);

  var hintDiv = document.createElement('div');
  hintDiv.style.cssText = 'font-size:0.85rem;color:#555;margin-bottom:10px;';
  hintDiv.textContent = '\uD83D\uDCA1 ' + verb.hint;
  block.appendChild(hintDiv);

  var table = document.createElement('table');
  table.className = 'konj-table';
  var thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>Person</th><th>Konjunktiv II</th></tr>';
  table.appendChild(thead);
  var tbody = document.createElement('tbody');

  verb.rows.forEach(function(row) {
    var tr = document.createElement('tr');
    var tdP = document.createElement('td');
    tdP.className = 'person';
    tdP.textContent = row.person;
    tr.appendChild(tdP);

    var tdV = document.createElement('td');
    if (row.answer === null) {
      // gegeben — nicht ausfüllbar
      var span = document.createElement('span');
      span.className = 'konj-given';
      span.textContent = row.given;
      tdV.appendChild(span);
    } else {
      // ausfüllbar
      var inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'konj-inp';
      inp.dataset.answer = row.answer;
      inp.dataset.panel = idx;
      inp.oninput = function() {
        timerAutoStart(5);
        konjLiveCheck(this);
        konjCheckAllOk();
      };
      tdV.appendChild(inp);
    }
    tr.appendChild(tdV);
    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  block.appendChild(table);
  panel.appendChild(block);
  return panel;
}

function konjLiveCheck(inp) {
  var val = inp.value.trim().toLowerCase();
  var ans = (inp.dataset.answer || '').toLowerCase();
  inp.classList.remove('correct', 'wrong');
  if (val.length === 0) return;
  if (val === ans) { inp.classList.add('correct'); return; }
  if (ans.indexOf(val) === 0) return;
  inp.classList.add('wrong');
}

function konjCheckAllOk() {
  var all = document.querySelectorAll('.konj-inp');
  var ok = true;
  all.forEach(function(inp) { if (!inp.classList.contains('correct')) ok = false; });
  if (ok && all.length > 0) timerStop(5);
}

  var container = document.getElementById('konj-panels');
  container.innerHTML = '';
  KONJ_VERBS.forEach(function(v, i) {
    container.appendChild(konjBuildPanel(i));

}

  currentKonjPanel = idx;
