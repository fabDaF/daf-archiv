// ─── TIMER ───────────────────────────────────────────────────────
var TIMER_PREFIX = 'werden_ueb2_';
var timerStarted  = [false, false, false, false];
var timerRunning  = [false, false, false, false];
var timerSeconds  = [0, 0, 0, 0];
var timerIntervals = [null, null, null, null];

function timerAutoStart(n) {
  if (timerStarted[n]) return;
  timerStarted[n] = true;
  timerRunning[n] = true;
  timerIntervals[n] = setInterval(function() {
    timerSeconds[n]++;
    var el = document.getElementById('timer-' + n);
    if (el) el.textContent = fmtTime(timerSeconds[n]);
  }, 1000);
}
function timerStop(n) {
  if (!timerRunning[n]) return;
  clearInterval(timerIntervals[n]);
  timerRunning[n] = false;
  var best = parseInt(localStorage.getItem(TIMER_PREFIX + n) || '999999');
  if (timerSeconds[n] > 0 && timerSeconds[n] < best) {
    localStorage.setItem(TIMER_PREFIX + n, timerSeconds[n]);
    var el = document.getElementById('best-' + n);
    if (el) el.textContent = fmtTime(timerSeconds[n]);
  }
}
function timerResetOne(n) {
  clearInterval(timerIntervals[n]);
  timerRunning[n] = false; timerStarted[n] = false; timerSeconds[n] = 0;
  var el = document.getElementById('timer-' + n);
  if (el) el.textContent = '0:00';
}
function fmtTime(s) {
  return Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + (s % 60);
}
function loadBestTimes() {
  for (var i = 1; i <= 3; i++) {
    var v = localStorage.getItem(TIMER_PREFIX + i);
    if (v) {
      var el = document.getElementById('best-' + i);
      if (el) el.textContent = fmtTime(parseInt(v));
    }
  }
}

// ─── MC-SYSTEM (Entdeckung) ───────────────────────────────────────
function mcCheck(step, btn, correct) {
  var btns = btn.parentElement.querySelectorAll('.mc-btn');
  btns.forEach(function(b) { b.disabled = true; });
  var fb = document.getElementById('mcfb' + step);
  if (correct) {
    btn.classList.add('correct');
    fb.textContent = '\u2713 Richtig! Weiter zum n\u00e4chsten Schritt.';
    fb.className = 'mc-feedback ok';
    document.getElementById('pdot' + step).classList.add('done');
    setTimeout(function() {
      var next = document.getElementById('mc-step' + (step + 1));
      if (next) { next.classList.add('active'); }
      else { document.getElementById('regelkarte').style.display = 'block'; }
    }, 700);
  } else {
    btn.classList.add('wrong');
    fb.textContent = '\u2717 Nicht ganz \u2014 schau nochmal genau hin.';
    fb.className = 'mc-feedback err';
    setTimeout(function() {
      btns.forEach(function(b) { b.disabled = false; b.classList.remove('wrong', 'correct'); });
      fb.textContent = ''; fb.className = 'mc-feedback';
    }, 1400);
  }
}

// ─── LIVECHECK ────────────────────────────────────────────────────
function liveCheck(inp) {
  var val = inp.value.trim().toLowerCase();
  var ans = (inp.dataset.answer || '').toLowerCase();
  inp.classList.remove('correct', 'wrong');
  if (val.length === 0) return;
  if (val === ans) { inp.classList.add('correct'); }
  else if (ans.indexOf(val) === 0) { /* gültiger Präfix — neutral */ }
  else { inp.classList.add('wrong'); }
}
function showHint(inp) {
  var next = inp.nextElementSibling;
  if (next && next.classList.contains('correction-hint')) next.remove();
  if (!inp.classList.contains('correct')) {
    var hint = document.createElement('span');
    hint.className = 'correction-hint';
    hint.textContent = inp.dataset.answer;
    inp.insertAdjacentElement('afterend', hint);
  }
  inp.value = inp.dataset.answer;
  inp.classList.add('correct'); inp.classList.remove('wrong');
}

var lueckeInputs = [];

function lueckeInit() {
  var container = document.getElementById('luecke-container');
  container.innerHTML = '';
  lueckeInputs = [];

  LUECKEN_DATA.forEach(function(item, idx) {
    var div = document.createElement('div');
    div.className = 'luecke-satz';

    var nr = document.createElement('span');
    nr.className = 'luecke-nr';
    nr.textContent = (idx + 1) + '.';
    div.appendChild(nr);

    item.segs.forEach(function(seg) {
      if (seg.t !== undefined) {
        div.appendChild(document.createTextNode(seg.t));
      } else {
        var w = { s: 65, m: 95, l: 140, xl: 185 }[seg.s] || 95;
        var inp = document.createElement('input');
        inp.type = 'text';
        inp.className = 'blank';
        inp.style.width = w + 'px';
        inp.dataset.answer = seg.b;
        inp.autocomplete = 'off';
        inp.spellcheck = false;
        inp.oninput = function() {
          timerAutoStart(1);
          liveCheck(this);
          updateScore1();
          checkAllOk1();
        };
        div.appendChild(inp);
        lueckeInputs.push(inp);
      }
    });

    var hint = document.createElement('span');
    hint.className = 'luecke-hint';
    hint.textContent = item.hint;
    div.appendChild(hint);

    container.appendChild(div);
  });

  document.getElementById('total1').textContent = lueckeInputs.length;
  updateScore1();
}

function updateScore1() {
  var ok = lueckeInputs.filter(function(i) { return i.classList.contains('correct'); }).length;
  document.getElementById('score1').textContent = ok;
}
function checkAllOk1() {
  if (lueckeInputs.every(function(i) { return i.classList.contains('correct'); })) timerStop(1);
}
function lueckeShow() {
  lueckeInputs.forEach(function(inp) { showHint(inp); });
  timerStop(1); updateScore1();
}
function lueckeReset() {
  lueckeInputs.forEach(function(inp) {
    inp.value = ''; inp.classList.remove('correct', 'wrong');
    var next = inp.nextElementSibling;
    if (next && next.classList.contains('correction-hint')) next.remove();
  });
  timerResetOne(1); updateScore1();
}

var ZUO_DATA = [
  { text: 'Er wird langsam m\u00fcde.',                          cat: 'vollverb' },
  { text: 'Das Haus wird renoviert.',                            cat: 'hilfsverb' },
  { text: 'Sie wurde sehr erfolgreich.',                         cat: 'vollverb' },
  { text: 'Der Politiker wurde gew\u00e4hlt.',                   cat: 'hilfsverb' },
  { text: 'Ich w\u00fcrde gern Arzt werden.',                    cat: 'vollverb' },
  { text: 'Er w\u00fcrde kommen, wenn er Zeit h\u00e4tte.',      cat: 'hilfsverb' },
  { text: 'Das Kind wurde krank.',                               cat: 'vollverb' },
  { text: 'Das Medikament wird t\u00e4glich verabreicht.',       cat: 'hilfsverb' },
  { text: 'Sie werden n\u00e4chstes Jahr Eltern.',               cat: 'vollverb' },
  { text: 'Wir werden das Problem l\u00f6sen.',                  cat: 'hilfsverb' },
  { text: 'Das Wasser wird w\u00e4rmer.',                        cat: 'vollverb' },
  { text: 'Das Ergebnis wird bekannt gegeben.',                  cat: 'hilfsverb' },
  { text: 'Er wurde sehr beliebt.',                              cat: 'vollverb' },
  { text: 'Die Frage wurde nicht beantwortet.',                  cat: 'hilfsverb' },
];

var zuoSelected = null;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function colorZuordnungChip(chip) {
  var zone = chip.closest('.drop-zone');
  if (zone) {
    chip.classList.remove('correct', 'wrong');
    chip.classList.add(chip.dataset.cat === zone.dataset.cat ? 'correct' : 'wrong');
  } else {
    chip.classList.remove('correct', 'wrong');
  }
}
function colorAllZuordnungChips() {
  document.querySelectorAll('#sec-2 .chip').forEach(function(chip) { colorZuordnungChip(chip); });
  updateZuoCounter();
  checkZuoAllOk();
}
function updateZuoCounter() {
  var placed = document.querySelectorAll('#sec-2 .drop-zone .chip').length;
  document.getElementById('zuo-counter').textContent = 'Platziert: ' + placed + ' / ' + ZUO_DATA.length;
}
function checkZuoAllOk() {
  var chips = document.querySelectorAll('#sec-2 .chip');
  if (chips.length !== ZUO_DATA.length) return;
  if (Array.from(chips).every(function(c) { return c.classList.contains('correct'); })) timerStop(2);
}

function zuoInit() {
  var bank  = document.getElementById('zuo-bank');
  var zoneV = document.getElementById('zone-vollverb');
  var zoneH = document.getElementById('zone-hilfsverb');

  Array.from(zoneV.children).forEach(function(c) { if (c.tagName !== 'H4') c.remove(); });
  Array.from(zoneH.children).forEach(function(c) { if (c.tagName !== 'H4') c.remove(); });
  bank.innerHTML = '';
  zuoSelected = null;

  shuffle(ZUO_DATA).forEach(function(item) {
    var chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = item.text;
    chip.draggable = true;
    chip.dataset.cat = item.cat;

    chip.addEventListener('dragstart', function(e) {
      e.dataTransfer.setData('text/plain', item.text);
      chip.style.opacity = '0.5';
      timerAutoStart(2);
    });
    chip.addEventListener('dragend', function() {
      chip.style.opacity = '1';
      colorAllZuordnungChips();
    });
    chip.addEventListener('click', function() {
      timerAutoStart(2);
      if (zuoSelected === chip) { chip.classList.remove('selected'); zuoSelected = null; return; }
      if (zuoSelected) zuoSelected.classList.remove('selected');
      zuoSelected = chip; chip.classList.add('selected');
    });
    bank.appendChild(chip);
  });

  function makeDrop(zone) {
    zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
    zone.addEventListener('drop', function(e) {
      e.preventDefault(); zone.classList.remove('dragover');
      var text = e.dataTransfer.getData('text/plain');
      var chip = Array.from(document.querySelectorAll('#sec-2 .chip')).find(function(c) {
        return c.textContent === text;
      });
      if (chip) { zone.appendChild(chip); colorAllZuordnungChips(); }
    });
    zone.addEventListener('click', function() {
      if (zuoSelected && !zone.contains(zuoSelected)) {
        zone.appendChild(zuoSelected);
        zuoSelected.classList.remove('selected'); zuoSelected = null;
        colorAllZuordnungChips();
      }
    });
  }
  makeDrop(zoneV); makeDrop(zoneH);

  bank.addEventListener('dragover', function(e) { e.preventDefault(); });
  bank.addEventListener('drop', function(e) {
    e.preventDefault();
    var text = e.dataTransfer.getData('text/plain');
    var chip = Array.from(document.querySelectorAll('#sec-2 .chip')).find(function(c) { return c.textContent === text; });
    if (chip) { bank.appendChild(chip); colorAllZuordnungChips(); }
  });
  bank.addEventListener('click', function() {
    if (zuoSelected && !bank.contains(zuoSelected)) {
      bank.appendChild(zuoSelected);
      zuoSelected.classList.remove('selected'); zuoSelected = null;
      colorAllZuordnungChips();
    }
  });

  updateZuoCounter();
}

function zuoShow() {
  var zoneV = document.getElementById('zone-vollverb');
  var zoneH = document.getElementById('zone-hilfsverb');
  document.querySelectorAll('#sec-2 .chip').forEach(function(chip) {
    if (chip.dataset.cat === 'vollverb') zoneV.appendChild(chip);
    else zoneH.appendChild(chip);
    chip.classList.remove('selected', 'wrong'); chip.classList.add('correct');
  });
  timerStop(2); updateZuoCounter();
}
function zuoReset() { zuoInit(); timerResetOne(2); }

// ─── SATZBAU DATEN ────────────────────────────────────────────────
var SB_DATA = [
  { id:1, parts:['Er','wird','langsam','m\u00fcde',',','wenn','er','lange','arbeitet','.'],
           answer:['er','wird','langsam','m\u00fcde',',','wenn','er','lange','arbeitet','.'] },
  { id:2, parts:['Das','Haus','wurde','komplett','renoviert','.'],
           answer:['das','haus','wurde','komplett','renoviert','.'] },
  { id:3, parts:['Ich','w\u00fcrde','gern','Arzt','werden',',','aber','das','Studium','ist','lang','.'],
           answer:['ich','w\u00fcrde','gern','arzt','werden',',','aber','das','studium','ist','lang','.'] },
  { id:4, parts:['Sie','werden','n\u00e4chstes','Jahr','Eltern','werden','.'],
           answer:['sie','werden','n\u00e4chstes','jahr','eltern','werden','.'] },
  { id:5, parts:['Das','Ergebnis','wird','morgen','bekannt','gegeben','.'],
           answer:['das','ergebnis','wird','morgen','bekannt','gegeben','.'] },
  { id:6, parts:['Er','w\u00fcrde','kommen',',','wenn','er','Zeit','h\u00e4tte','.'],
           answer:['er','w\u00fcrde','kommen',',','wenn','er','zeit','h\u00e4tte','.'] },
  { id:7, parts:['Der','Politiker','wurde','bei','den','Wahlen','gew\u00e4hlt','.'],
           answer:['der','politiker','wurde','bei','den','wahlen','gew\u00e4hlt','.'] },
  { id:8, parts:['Wir','werden','das','Problem','gemeinsam','l\u00f6sen','.'],
           answer:['wir','werden','das','problem','gemeinsam','l\u00f6sen','.'] },
];

function sbInit() {
  var container = document.getElementById('sb-container');
  container.innerHTML = '';

  SB_DATA.forEach(function(data, idx) {
    var block = document.createElement('div');
    block.className = 'sb-block';

    var lbl = document.createElement('div');
    lbl.className = 'sb-label';
    lbl.textContent = 'Satz ' + data.id;
    block.appendChild(lbl);

    var pool = document.createElement('div');
    pool.className = 'chip-pool';
    pool.id = 'pool-' + idx;

    shuffle(data.parts).forEach(function(part) {
      var chip = document.createElement('div');
      chip.className = (part === ',' || part === '.') ? 'chip comma-chip' : 'chip';
      chip.textContent = part;
      chip.dataset.orig = part;
      chip.draggable = true;

      chip.addEventListener('click', function() {
        timerAutoStart(3);
        var row = document.getElementById('row-' + idx);
        if (row.contains(chip)) {
          pool.appendChild(chip);
          chip.classList.remove('correct','wrong');
        } else {
          row.appendChild(chip);
        }
        updateCaps(idx); colorSbRow(idx);
      });
      chip.addEventListener('dragstart', function(e) {
        e.dataTransfer.setData('text/plain', idx + '\x00' + part);
        chip.style.opacity = '0.5';
        timerAutoStart(3);
      });
      chip.addEventListener('dragend', function() { chip.style.opacity = '1'; });

      pool.appendChild(chip);
    });
    block.appendChild(pool);

    var row = document.createElement('div');
    row.className = 'drop-row';
    row.id = 'row-' + idx;
    row.addEventListener('dragover', function(e) { e.preventDefault(); row.classList.add('dragover'); });
    row.addEventListener('dragleave', function() { row.classList.remove('dragover'); });
    row.addEventListener('drop', function(e) {
      e.preventDefault(); row.classList.remove('dragover');
      var parts = e.dataTransfer.getData('text/plain').split('\x00');
      var srcIdx = parseInt(parts[0]);
      var orig = parts[1];
      var src = document.getElementById('pool-' + srcIdx) || document.getElementById('row-' + srcIdx);
      var chip = src ? Array.from(src.querySelectorAll('.chip')).find(function(c) { return c.dataset.orig === orig; }) : null;
      if (chip) { row.appendChild(chip); updateCaps(idx); colorSbRow(idx); }
    });
    block.appendChild(row);
    container.appendChild(block);
  });
}

function updateCaps(idx) {
  var row = document.getElementById('row-' + idx);
  Array.from(row.querySelectorAll('.chip')).forEach(function(c, i) {
    var orig = c.dataset.orig;
    c.textContent = (i === 0 && orig !== ',' && orig !== '.') ?
      orig.charAt(0).toUpperCase() + orig.slice(1) : orig;
  });
}

function colorSbRow(idx) {
  var row = document.getElementById('row-' + idx);
  var data = SB_DATA[idx];
  Array.from(row.querySelectorAll('.chip')).forEach(function(chip, i) {
    chip.classList.remove('correct', 'wrong');
    if (i < data.answer.length) {
      chip.classList.add(chip.dataset.orig.toLowerCase() === data.answer[i] ? 'correct' : 'wrong');
    } else {
      chip.classList.add('wrong');
    }
  });
  checkSbAllOk();
}

function checkSbAllOk() {
  var all = SB_DATA.every(function(data, idx) {
    var chips = Array.from(document.getElementById('row-' + idx).querySelectorAll('.chip'));
    return chips.length === data.answer.length &&
      chips.every(function(c, i) { return c.dataset.orig.toLowerCase() === data.answer[i]; });
  });
  if (all) timerStop(3);
}

function sbShow() {
  SB_DATA.forEach(function(data, idx) {
    var pool = document.getElementById('pool-' + idx);
    var row  = document.getElementById('row-' + idx);
    var all  = Array.from(pool.querySelectorAll('.chip')).concat(Array.from(row.querySelectorAll('.chip')));
    data.parts.forEach(function(part) {
      var chip = all.find(function(c) { return c.dataset.orig === part; });
      if (chip) { row.appendChild(chip); chip.classList.remove('wrong'); chip.classList.add('correct'); all.splice(all.indexOf(chip), 1); }
    });
    updateCaps(idx);
  });
  timerStop(3);
}
function sbReset() { sbInit(); timerResetOne(3); }

lueckeInit();
zuoInit();
sbInit();
loadBestTimes();
